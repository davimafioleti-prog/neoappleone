<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>NeoApple — Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="login-container">
  <div class="login-box">
    <img src="logo.png.jpg" alt="NeoApple One" class="login-logo"/>
    <h1>NeoApple One</h1>
    <p>Sistema de Gestão de Vendas</p>
    <button class="btn-google" id="btnLogin">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"/>
      Entrar com Google
    </button>
  </div>
</div>
<script type="module">
  import { loginGoogle, auth } from "./app.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = "dashboard.html";
  });
  document.getElementById("btnLogin").addEventListener("click", loginGoogle);
</script>
</body>
</html>
